name: RealMiniCi

on:
    push: 
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix: 
                node-version: [16, 18]

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node 18
              uses: actions/setup-node@v4
              with: 
                node-version: ${{ matrix.node-version }}
                cache: 'npm'
            
            - name: Install dependencies
              run: npm install
            
            - name: Run tests
              run: npm test
            
            
