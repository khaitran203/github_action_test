name: RealMiniCi

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 18]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Show Node version
        run: echo "Running Node ${{ matrix.node-version }}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test